    Time tracking history page

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>MO HealthVerify - Time Record History</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="../style/sitewide-style.css" rel="stylesheet"/>
</head>
<body>
<div class="top-header">
    <div class="logo"><img alt="Image courtesy of Missouri Department of Social Services."
                           src="../img/missouriDSSLogo.png"></div>
    <div class="top-links">
        <a class="top-link" href="https://dss.mo.gov">DSS</a>
        <a class="top-link" href="https://mo.gov">mo.gov</a>
        <a class="top-link" href="#">Governor Kehoe</a>
        <a class="top-link" href="#">Find an Agency</a>
        <a class="top-link" href="#">Online Services</a>
    </div>
</div>

<div class="nav-bar">
    <span>About</span>
    <span>Divisions</span>
    <span>Services</span>
    <span>Public Data</span>
    <span>Providers</span>
    <span>Contact Us</span>
</div>

<div class="container">
    <div class="upload-wrapper">
        <h2>Time record history</h2>
        <p>Previously entered time records, newest first.</p>

        <div class="upload-guidance">
            <a class="action-link" href="time-tracking.html">Enter time records</a>
            <a class="action-link" href="home.html">Return to landing page</a>
        </div>

        <div aria-live="polite" class="page-message" id="historyMessage"></div>

        <div class="upload-card">
            <div class="history-table-wrap">
                <table class="history-table">
                    <thead>
                    <tr>
                        <th>Start Time</th>
                        <th>End Time</th>
                        <th>Type ID</th>
                    </tr>
                    </thead>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="../scripts/time-tracking-history.js"></script>
<script src="../scripts/magnifying-lens.js"></script>
</body>
</html>
