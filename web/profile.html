<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>MO HealthVerify - Profile</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="../style/sitewide-style.css" rel="stylesheet"/>
</head>
<body>
<div class="top-header">
    <div class="logo"><img alt="Image courtesy of Missouri Department of Social Services."
                           src="../img/missouriDSSLogo.png"></div>
    <div class="top-links">
        <a class="top-link" href="https://dss.mo.gov">DSS</a>
        <a class="top-link" href="https://mo.gov">mo.gov</a>
        <a class="top-link" href="#">Governor Kehoe</a>
        <a class="top-link" href="#">Find an Agency</a>
        <a class="top-link" href="#">Online Services</a>
    </div>
</div>

<div class="nav-bar">
    <span>About</span>
    <span>Divisions</span>
    <span>Services</span>
    <span>Public Data</span>
    <span>Providers</span>
    <span>Contact Us</span>
</div>

<div class="container">
    <div class="profile-wrapper">
        <h2>Applicant Profile</h2>
        <p>Review and update the applicant details currently available in the frontend profile record.</p>
        <div class="page-message" id="profileMessage"></div>

        <div class="form-box profile-form-box">
            <form id="profileForm">
                <div class="profile-grid">
                    <div class="profile-field">
                        <label for="profileFirstName">First Name</label>
                        <input id="profileFirstName" required type="text"/>
                    </div>

                    <div class="profile-field">
                        <label for="profileLastName">Last Name</label>
                        <input id="profileLastName" required type="text"/>
                    </div>

                    <div class="profile-field profile-field-full">
                        <label for="profileEmail">Email Address</label>
                        <input id="profileEmail" required type="email"/>
                    </div>

                    <div class="profile-field">
                        <label for="profileDatetimeRegistered">Registered On</label>
                        <input id="profileDatetimeRegistered" readonly type="text"/>
                    </div>

                    <div class="profile-field">
                        <label for="profileLastLogin">Last Login</label>
                        <input id="profileLastLogin" readonly type="text"/>
                    </div>
                </div>

                <div class="profile-actions">
                    <button class="button-inline primary" type="submit">Save Profile</button>
                    <button class="button-inline" id="clearProfileButton" type="button">Clear Profile</button>
                    <a class="action-link" href="home.html">Return to landing page</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="../scripts/profile-storage.js"></script>
<script src="../scripts/profile.js"></script>
<script src="../scripts/magnifying-lens.js"></script>
</body>
</html>
